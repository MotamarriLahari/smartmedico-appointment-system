{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="container">
    <div class="auth-card mx-auto">
      <div class="auth-logo">Smart<span>Medico</span></div>
      <p class="auth-subtitle">Welcome back! Login to your account</p>
      <form id="loginForm" method="POST">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="text" name="email" id="email" class="form-control" placeholder="Enter your email">
          <div class="invalid-feedback" id="emailError"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password">
          <div class="invalid-feedback" id="passwordError"></div>
        </div>
        <button type="submit" class="btn-auth mt-2">Login</button>
      </form>
      <div class="auth-divider mt-4">don't have an account?</div>
      <div class="text-center mt-3">
        <a href="/register" style="color:#00b894;font-weight:600;text-decoration:none;">Register here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
